spring:
  application:
    name: beverage
  #数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vending_machine
    username: root
    password: 123456
  #上传文件配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
file:
  upload-path: C:/uploads/
  #mybatis-plus配置
mybatis-plus:
  global-config:
    db-config:
      logic-not-delete-value: 0
      logic-delete-value: 1
      logic-delete-field: isDelete
      #mybatis-plus日志配置
